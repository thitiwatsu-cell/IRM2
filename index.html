<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | IRM Extra</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#111;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:400px;
background:#1a1a1a;
padding:40px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,122,0,.25);
border:1px solid rgba(255,122,0,.3);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo img{
width:120px;
margin-bottom:10px;
}

.logo h1{
color:#ff7a00;
font-size:36px;
}

.logo p{
color:#ccc;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
color:#ddd;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

input:focus{
outline:none;
box-shadow:0 0 10px rgba(255,122,0,.4);
}

button{
width:100%;
padding:14px;
background:#ff7a00;
border:none;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e56c00;
}

.error{
background:#ff3b3b;
padding:10px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
display:none;
}

</style>
</head>

<body>

<div class="login-box">

<div class="logo">

<img src="IRM2.png">

<h1>IRM Extra</h1>

<p>Admin System</p>

</div>

<div class="error" id="errorBox">
ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
</div>

<div class="form-group">
<label>ชื่อผู้ใช้</label>
<input type="text" id="username">
</div>

<div class="form-group">
<label>รหัสผ่าน</label>
<input type="password" id="password">
</div>

<button onclick="login()">
เข้าสู่ระบบ
</button>

</div>

<script>

function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

if(username === "admin" && password === "123456"){

localStorage.setItem("admin_login","true");

window.location.href="admin-dashboard.html";

}else{

document.getElementById("errorBox").style.display="block";

}

}

</script>

</body>
</html>
