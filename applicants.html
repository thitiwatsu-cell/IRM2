<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:#111;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100%;
background:#1a1a1a;
border-right:2px solid #ff7a00;
padding:20px;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
height:80px;

}

.logo h2{

}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
text-decoration:none;

color:white;
border-radius:10px;

}

.menu a:hover{

}

.page-title{

}

.search-box input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
}

.table-box{
background:#1a1a1a;
padding:20px;
border-radius:20px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#ff7a00;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #333;
}

.btn{
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:600;
}

.view{
background:#2196f3;
}

.accept{
background:#ff7a00;
}

.reject{
background:#e53935;
}

.back{
display:inline-block;
margin-bottom:20px;

text-decoration:none;
